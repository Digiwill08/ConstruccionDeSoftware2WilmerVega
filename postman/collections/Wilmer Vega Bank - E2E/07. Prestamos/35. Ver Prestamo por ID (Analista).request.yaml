$kind: http-request
name: '35. Ver Préstamo por ID (Analista)'
method: GET
url: '{{baseUrl}}/api/analyst/loans/{{loanId}}'
order: 35000
headers:
  - key: Authorization
    value: 'Bearer {{analystToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
