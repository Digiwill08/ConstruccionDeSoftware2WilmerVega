$kind: http-request
name: '12. Aprobar Prestamo (Analista)'
method: POST
url: '{{baseUrl}}/api/analyst/loans/{{loanId}}/approve'
order: 12000
headers:
  - key: Authorization
    value: 'Bearer {{analystToken}}'
queryParams:
  - key: analystUserId
    value: '{{analystUserId}}'
  - key: role
    value: INTERNAL_ANALYST
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
      const data = pm.response.json();
      pm.expect(data.loanStatus).to.eql('APPROVED');
