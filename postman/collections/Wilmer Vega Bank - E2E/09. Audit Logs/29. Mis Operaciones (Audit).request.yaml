$kind: http-request
name: '29. Mis Operaciones (Audit)'
method: GET
url: '{{baseUrl}}/api/audit-logs/my-operations'
order: 29000
headers:
  - key: Authorization
    value: 'Bearer {{companyEmployeeToken}}'
queryParams:
  - key: username
    value: '{{companyEmployeeUsername}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200 o 503', function () { pm.expect([200,503]).to.include(pm.response.code); });
