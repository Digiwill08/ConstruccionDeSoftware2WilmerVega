$kind: http-request
name: '30. Audit Logs por Producto'
method: GET
url: '{{baseUrl}}/api/audit-logs/product/{{loanId}}'
order: 30000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200 o 503', function () { pm.expect([200,503]).to.include(pm.response.code); });
