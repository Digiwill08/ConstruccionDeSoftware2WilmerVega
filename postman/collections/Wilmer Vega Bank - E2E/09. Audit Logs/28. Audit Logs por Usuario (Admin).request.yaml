$kind: http-request
name: '28. Audit Logs por Usuario (Admin)'
method: GET
url: '{{baseUrl}}/api/admin/audit-logs/user/{{loggedUserId}}'
order: 28000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200 o 503', function () { pm.expect([200,503]).to.include(pm.response.code); });
