$kind: http-request
name: '38. Audit Logs por Producto (Analista)'
method: GET
url: '{{baseUrl}}/api/analyst/audit-logs/product/{{loanId}}'
order: 38000
headers:
  - key: Authorization
    value: 'Bearer {{analystToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200 o 503', function () { pm.expect([200,503]).to.include(pm.response.code); });
