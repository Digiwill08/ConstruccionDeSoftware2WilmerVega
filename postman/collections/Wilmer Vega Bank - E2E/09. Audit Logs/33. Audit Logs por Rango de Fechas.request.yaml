$kind: http-request
name: '33. Audit Logs por Rango de Fechas'
method: GET
url: '{{baseUrl}}/api/audit-logs/date-range'
order: 33000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
queryParams:
  - key: startDate
    value: '2026-01-01'
  - key: endDate
    value: '2026-12-31'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200 o 503', function () { pm.expect([200,503]).to.include(pm.response.code); });
