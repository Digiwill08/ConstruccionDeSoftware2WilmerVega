$kind: http-request
name: '39. Audit Logs por Usuario (Analista)'
method: GET
url: '{{baseUrl}}/api/analyst/audit-logs/user/{{analystUserId}}'
order: 39000
headers:
  - key: Authorization
    value: 'Bearer {{analystToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200 o 503', function () { pm.expect([200,503]).to.include(pm.response.code); });
