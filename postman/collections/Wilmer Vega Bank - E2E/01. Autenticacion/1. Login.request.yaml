$kind: http-request
name: 1. Login
method: POST
url: '{{baseUrl}}/auth/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "{{username}}",
      "password": "{{password}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
      const data = pm.response.json();
      pm.expect(data.token).to.be.a('string').and.not.empty;
      pm.environment.set('token', data.token);
      pm.environment.set('analystToken', data.token);
      pm.environment.set('loggedUser', data.username || '');
      pm.environment.set('loggedRole', data.role || '');
      pm.environment.set('loggedUserId', data.userId || '');
      pm.environment.set('analystUserId', data.userId || '');
    language: text/javascript
