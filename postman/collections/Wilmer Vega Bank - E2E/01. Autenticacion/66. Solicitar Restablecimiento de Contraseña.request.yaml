$kind: http-request
name: '66. Request Password Reset'
method: POST
url: '{{baseUrl}}/api/auth/forgot-password'
order: 66000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{userEmail}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
