$kind: http-request
name: '68. Ver Perfil de Usuario Autenticado'
method: GET
url: '{{baseUrl}}/api/auth/profile'
order: 68000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
      pm.test('Tiene campo email', function () {
        var json = pm.response.json();
        pm.expect(json).to.have.property('email');
      });
