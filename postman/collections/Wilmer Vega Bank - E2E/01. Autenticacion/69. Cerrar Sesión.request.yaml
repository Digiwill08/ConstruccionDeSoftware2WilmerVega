$kind: http-request
name: '69. Cerrar Sesión'
method: POST
url: '{{baseUrl}}/api/auth/logout'
order: 69000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200 o 204', function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
      pm.environment.unset('token');
