$kind: http-request
name: '26. Ver Usuario por Username (Admin)'
method: GET
url: '{{baseUrl}}/api/admin/users/username/{{companyEmployeeUsername}}'
order: 26000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
