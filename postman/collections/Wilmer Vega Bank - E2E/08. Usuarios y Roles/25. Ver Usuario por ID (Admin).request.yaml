$kind: http-request
name: '25. Ver Usuario por ID (Admin)'
method: GET
url: '{{baseUrl}}/api/admin/users/{{loggedUserId}}'
order: 25000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
