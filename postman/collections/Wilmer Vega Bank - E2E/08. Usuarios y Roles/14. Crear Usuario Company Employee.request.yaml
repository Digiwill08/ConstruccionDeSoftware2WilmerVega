$kind: http-request
name: '14. Crear Usuario Company Employee'
method: POST
url: '{{baseUrl}}/api/admin/users'
order: 14000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{analystToken}}'
body:
  type: json
  content: |-
    {
      "username": "companyemp{{$timestamp}}",
      "password": "123456",
      "systemRole": "COMPANY_EMPLOYEE"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
      const data = pm.response.json();
      pm.environment.set('companyEmployeeUsername', data.username || '');
      pm.environment.set('companyEmployeePassword', '123456');
