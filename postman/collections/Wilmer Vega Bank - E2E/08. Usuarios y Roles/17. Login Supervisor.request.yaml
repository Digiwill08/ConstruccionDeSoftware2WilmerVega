$kind: http-request
name: '17. Login Supervisor'
method: POST
url: '{{baseUrl}}/auth/login'
order: 17000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "{{supervisorUsername}}",
      "password": "{{supervisorPassword}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
      const data = pm.response.json();
      pm.environment.set('supervisorToken', data.token);
      pm.environment.set('supervisorUserId', data.userId || '');
