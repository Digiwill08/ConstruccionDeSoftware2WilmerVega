$kind: http-request
name: '15. Crear Usuario Supervisor'
method: POST
url: '{{baseUrl}}/api/admin/users'
order: 15000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{analystToken}}'
body:
  type: json
  content: |-
    {
      "username": "supervisor{{$timestamp}}",
      "password": "123456",
      "systemRole": "COMPANY_SUPERVISOR"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
      const data = pm.response.json();
      pm.environment.set('supervisorUsername', data.username || '');
      pm.environment.set('supervisorPassword', '123456');
