$kind: http-request
name: '23. Ver Transferencia por ID (Cliente)'
method: GET
url: '{{baseUrl}}/api/client/transfers/{{pendingTransferId}}'
order: 23000
headers:
  - key: Authorization
    value: 'Bearer {{companyEmployeeToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
