$kind: http-request
name: '40. Ver Transferencia por ID (Supervisor)'
method: GET
url: '{{baseUrl}}/api/supervisor/transfers/{{pendingTransferId}}'
order: 40000
headers:
  - key: Authorization
    value: 'Bearer {{supervisorToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
