$kind: http-request
name: '20. Aprobar Transferencia Pendiente (Supervisor)'
method: POST
url: '{{baseUrl}}/api/supervisor/transfers/{{pendingTransferId}}/approve'
order: 20000
headers:
  - key: Authorization
    value: 'Bearer {{supervisorToken}}'
queryParams:
  - key: supervisorUserId
    value: '{{supervisorUserId}}'
  - key: role
    value: COMPANY_SUPERVISOR
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
      const data = pm.response.json();
      pm.expect(data.transferStatus).to.eql('EXECUTED');
