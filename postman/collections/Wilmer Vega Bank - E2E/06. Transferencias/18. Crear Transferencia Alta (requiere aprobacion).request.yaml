$kind: http-request
name: '18. Crear Transferencia Alta (requiere aprobacion)'
method: POST
url: '{{baseUrl}}/api/client/transfers'
order: 18000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{companyEmployeeToken}}'
body:
  type: json
  content: |-
    {
      "sourceAccount": { "id": {{sourceAccountId}}, "accountNumber": "{{sourceAccountNumber}}" },
      "destinationAccount": { "id": {{destinationAccountId}}, "accountNumber": "{{destinationAccountNumber}}" },
      "amount": 12000000,
      "creatorUserId": {{companyEmployeeUserId}}
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
      const data = pm.response.json();
      pm.expect(data.transferStatus).to.eql('AWAITING_APPROVAL');
      pm.environment.set('pendingTransferId', data.transferId);
