$kind: http-request
name: '57. Realizar Depósito'
method: POST
url: '{{baseUrl}}/api/transactions/deposit'
order: 57000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "accountNumber": "{{accountNumber}}",
      "amount": 100000,
      "description": "Test deposit"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200 o 201', function () { pm.expect([200,201]).to.include(pm.response.code); });
      if (pm.response.code === 200 || pm.response.code === 201) {
        var json = pm.response.json();
        if (json.transactionId) pm.environment.set('transactionId', json.transactionId);
      }
