$kind: http-request
name: '58. Realizar Retiro'
method: POST
url: '{{baseUrl}}/api/transactions/withdrawal'
order: 58000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "accountNumber": "{{accountNumber}}",
      "amount": 50000,
      "description": "Test withdrawal"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200 o 201', function () { pm.expect([200,201]).to.include(pm.response.code); });
