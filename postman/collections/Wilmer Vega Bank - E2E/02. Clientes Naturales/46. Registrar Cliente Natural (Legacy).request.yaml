$kind: http-request
name: '46. Registrar Cliente Natural (Legacy)'
method: POST
url: '{{baseUrl}}/api/customers-legacy/natural/register'
order: 46000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "fullName": "Legacy Natural",
      "documentNumber": "LEG{{$timestamp}}",
      "email": "legacy{{$timestamp}}@demo.com",
      "phone": "3001234567",
      "birthDate": "1990-01-01",
      "address": "Calle Legacy 123",
      "role": "NATURAL_CLIENT"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200 o 201', function () { pm.expect([200,201]).to.include(pm.response.code); });
