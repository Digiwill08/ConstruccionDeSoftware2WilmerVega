$kind: http-request
name: '3. Crear Cliente Empresa'
method: POST
url: '{{baseUrl}}/api/customers/company'
order: 3000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "businessName": "Empresa Demo {{$timestamp}}",
      "documentNumber": "90{{$timestamp}}",
      "email": "empresa{{$timestamp}}@demo.com",
      "phone": "3019876543",
      "address": "Av Empresa 456",
      "legalRepresentativeId": {{naturalClientId}}
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 201', function () { pm.response.to.have.status(201); });
      const data = pm.response.json();
      pm.expect(data.id).to.be.a('number');
      pm.environment.set('companyClientId', data.id);
