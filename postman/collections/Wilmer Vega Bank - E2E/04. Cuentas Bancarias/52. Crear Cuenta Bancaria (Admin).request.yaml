$kind: http-request
name: '52. Crear Cuenta Bancaria (Admin)'
method: POST
url: '{{baseUrl}}/api/admin/bank-accounts'
order: 52000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "customerId": {{naturalClientId}},
      "accountType": "SAVINGS",
      "initialBalance": 500000
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200 o 201', function () { pm.expect([200,201]).to.include(pm.response.code); });
      if (pm.response.code === 201 || pm.response.code === 200) {
        var json = pm.response.json();
        if (json.accountNumber) pm.environment.set('accountNumber', json.accountNumber);
      }
