$kind: http-request
name: '22. Ver Cuenta por Número (Cliente)'
method: GET
url: '{{baseUrl}}/api/client/bank-accounts/{{accountNumber}}'
order: 22000
headers:
  - key: Authorization
    value: 'Bearer {{companyEmployeeToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
