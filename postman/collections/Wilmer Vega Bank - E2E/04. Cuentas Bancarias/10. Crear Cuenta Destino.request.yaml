$kind: http-request
name: '10. Crear Cuenta Destino'
method: POST
url: '{{baseUrl}}/api/accounts'
order: 10000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "accountNumber": "DST{{$timestamp}}",
      "accountType": "SAVINGS",
      "currency": "USD",
      "holderId": {{naturalClientId}},
      "initialBalance": 500.00
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 201', function () { pm.response.to.have.status(201); });
      const data = pm.response.json();
      pm.expect(data.id).to.be.a('number');
      pm.environment.set('destinationAccountId', data.id);
      pm.environment.set('destinationAccountNumber', data.accountNumber || '');
