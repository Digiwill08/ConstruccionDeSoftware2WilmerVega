$kind: http-request
name: '63. Ver Saldo de Cuenta'
method: GET
url: '{{baseUrl}}/api/bank-accounts/{{accountNumber}}/balance'
order: 63000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
      pm.test('Tiene campo balance', function () {
        var json = pm.response.json();
        pm.expect(json).to.have.property('balance');
      });
