$kind: http-request
name: '4. Crear Cuenta Bancaria'
method: POST
url: '{{baseUrl}}/api/accounts'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "accountNumber": "ACC{{$timestamp}}",
      "accountType": "SAVINGS",
      "currency": "USD",
      "holderId": {{naturalClientId}},
      "initialBalance": 25000000.00
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 201', function () { pm.response.to.have.status(201); });
      const data = pm.response.json();
      pm.expect(data.id).to.be.a('number');
      pm.environment.set('accountId', data.id);
      pm.environment.set('accountNumber', data.accountNumber || '');
      pm.environment.set('sourceAccountId', data.id);
      pm.environment.set('sourceAccountNumber', data.accountNumber || '');
