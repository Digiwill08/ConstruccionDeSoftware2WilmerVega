$kind: http-request
name: '7. Listar Cuentas por Holder'
method: GET
url: '{{baseUrl}}/api/accounts'
order: 7000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
queryParams:
  - key: holderId
    value: '{{naturalClientId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });
