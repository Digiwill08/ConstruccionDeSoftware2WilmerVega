spring.application.name=wilmer-vega
server.port=8083

# -------------------------------------------------------
# H2 Database (archivo local persistente - no requiere instalacion)
# -------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/bank_db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.sql.init.mode=always

# -------------------------------------------------------
# MongoDB Atlas (Bitacora / AuditLog - NoSQL)
# -------------------------------------------------------
# Define MONGODB_URI para Atlas o usa el valor local por defecto.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://127.0.0.1:27017/bank_audit_db?connectTimeoutMS=5000&socketTimeoutMS=5000&serverSelectionTimeoutMS=5000}
spring.data.mongodb.database=${MONGODB_DATABASE:bank_audit_db}
app.mongodb.required=${MONGODB_REQUIRED:true}

# -------------------------------------------------------
# JWT Security
# -------------------------------------------------------
jwt.secret=ClinicAppSecretKeyForJsonWebTokenGeneration2026SecureKey
# JWT duration: 24 hours
jwt.expirationMs=86400000
