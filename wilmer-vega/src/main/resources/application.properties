spring.application.name=wilmer-vega
server.port=8083

# -------------------------------------------------------
# MySQL Database (transaccional)
# -------------------------------------------------------
spring.datasource.url=${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/bank_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.sql.init.mode=always

# -------------------------------------------------------
# MongoDB Atlas (Bitacora / AuditLog - NoSQL)
# -------------------------------------------------------
# Define MONGODB_URI para Atlas o usa el valor local por defecto.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://127.0.0.1:27017/bank_audit_db?connectTimeoutMS=5000&socketTimeoutMS=5000&serverSelectionTimeoutMS=5000}
spring.data.mongodb.database=${MONGODB_DATABASE:bank_audit_db}
app.mongodb.required=${MONGODB_REQUIRED:true}

# -------------------------------------------------------
# JWT Security
# -------------------------------------------------------
jwt.secret=${JWT_SECRET:ClinicAppSecretKeyForJsonWebTokenGeneration2026SecureKey}
# JWT duration: 24 hours
jwt.expiration=24h
