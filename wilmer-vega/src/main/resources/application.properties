spring.data.mongodb.uri=mongodb+srv://wilmervega_db_user:OlUFG6j2lTVBggO2@cluster0.sllke1u.mongodb.net/bank_audit_db?retryWrites=true&w=majority&appName=Cluster0&connectTimeoutMS=5000&socketTimeoutMS=5000&serverSelectionTimeoutMS=5000
spring.data.mongodb.database=bank_audit_db

